name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linters
        run: pip install ruff black
      - name: Run ruff
        run: ruff check platform/ || true
      - name: Run black check
        run: black --check platform/ || true

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pytest pandas pyarrow
      - name: Run tests
        run: pytest tests/ -v --junitxml=report.xml || true
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: report.xml

  validate-dag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Airflow
        run: |
          pip install apache-airflow==2.9.3 --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.9.3/constraints-3.11.txt"
      - name: Validate DAG syntax
        run: |
          python -c "
          import ast, sys, os
          dag_file = 'infra/docker/platform/airflow/dags/raw_academic_performance.py'
          with open(dag_file) as f:
              source = f.read()
          ast.parse(source)
          print('DAG syntax OK')
          "
